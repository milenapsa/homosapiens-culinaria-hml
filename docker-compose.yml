services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chefsapiens-hml:1.0
    container_name: chefsapiens-hml-v1-app
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    tmpfs: [/var/cache/nginx, /var/run]

  configure:
    image: docker:27-cli
    container_name: chefsapiens-hml-v1-configure
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    environment:
      APP_CONTAINER: chefsapiens-hml-v1-app
      CADDY_CONTAINER: media-studio-caddy
      HML_HOSTNAME: culinaria-hml.homosapiens.id
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_hml_backups:/backups
      - ./ops/configure-caddy.sh:/configure-caddy.sh:ro
    command: ["/bin/sh", "-c", "/configure-caddy.sh && touch /tmp/configured && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/configured"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  rollback:
    image: docker:27-cli
    container_name: chefsapiens-hml-v1-rollback
    profiles: [rollback]
    environment:
      APP_CONTAINER: chefsapiens-hml-v1-app
      CADDY_CONTAINER: media-studio-caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_hml_backups:/backups
      - ./ops/rollback-caddy.sh:/rollback-caddy.sh:ro
    command: ["/bin/sh", "/rollback-caddy.sh"]

volumes:
  caddy_hml_backups:
